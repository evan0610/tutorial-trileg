<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tri-Leg Tutorial</title>

  <style>
    :root {
      --bg: #08111f;
      --bg-2: #111827;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.16);
      --text: #f8fafc;
      --muted: #aab7cc;
      --accent: #8ab4ff;
      --accent-soft: rgba(138, 180, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(94, 130, 255, 0.28), transparent 32%),
        radial-gradient(circle at 85% 8%, rgba(76, 201, 240, 0.14), transparent 30%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    .page {
      width: min(1080px, calc(100% - 40px));
      margin: 0 auto;
      padding: 70px 0 48px;
    }

    .hero {
      text-align: center;
      margin-bottom: 38px;
    }

    .label {
      display: inline-block;
      padding: 7px 14px;
      border: 1px solid var(--card-border);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.055);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 84px);
      line-height: 1;
      letter-spacing: -0.055em;
      font-weight: 800;
    }

    .subtitle {
      margin: 22px auto 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .video-card {
      padding: 14px;
      border: 1px solid var(--card-border);
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.045));
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
    }

    .video-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      aspect-ratio: 16 / 9;
      background: #020617;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      background: #020617;
    }

    .fallback {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
      background:
        radial-gradient(circle at center, rgba(138, 180, 255, 0.12), transparent 42%),
        #020617;
    }

    .fallback h2 {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 700;
    }

    .fallback p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 22px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      color: var(--text);
      background: var(--accent-soft);
      text-decoration: none;
      font-size: 15px;
      transition: 0.18s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(138, 180, 255, 0.58);
      background: rgba(138, 180, 255, 0.26);
    }

    footer {
      margin-top: 34px;
      text-align: center;
      color: rgba(248, 250, 252, 0.52);
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 24px, 1080px);
        padding-top: 42px;
      }

      .subtitle {
        font-size: 16px;
      }

      .video-card {
        padding: 9px;
        border-radius: 22px;
      }

      .video-wrap {
        border-radius: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="label">Tutorial Video</div>
      <h1>Tri-Leg Tutorial</h1>
      <p class="subtitle">
        A concise video tutorial for the Tri-Leg system demonstration.
      </p>
    </section>

    <section class="video-card">
      <div class="video-wrap">
        <video id="tutorialVideo" controls preload="metadata">
          <source src="assets/videos/tutorial_trileg.mp4" type="video/mp4">
        </video>

        <div class="fallback" id="fallback">
          <div>
            <h2>Video Unavailable</h2>
            <p>Please open the video in a new tab.</p>
          </div>
        </div>
      </div>
    </section>

    <div class="actions">
      <a
        class="button"
        href="assets/videos/tutorial_trileg.mp4"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open Video in New Tab
      </a>
    </div>

    <footer>
      Created by WU Tianchun
    </footer>
  </main>

  <script>
    const video = document.getElementById("tutorialVideo");
    const fallback = document.getElementById("fallback");

    video.addEventListener("error", function () {
      fallback.style.display = "flex";
      video.style.display = "none";
    });

    setTimeout(function () {
      if (video.networkState === 3 || video.readyState === 0) {
        fallback.style.display = "flex";
        video.style.display = "none";
      }
    }, 1800);
  </script>
</body>
</html>
